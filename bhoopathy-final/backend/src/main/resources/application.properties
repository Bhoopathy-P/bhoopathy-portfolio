# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=bhoopathy-portfolio

# ── MySQL DataSource ──────────────────────────────────────────────────────────
# Update these credentials to match your local MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── OpenAI (optional) ─────────────────────────────────────────────────────────
# openai.api.key=sk-your-openai-key-here

# ── CORS ──────────────────────────────────────────────────────────────────────
# Handled via @CrossOrigin in controllers — update if deploying to a domain
